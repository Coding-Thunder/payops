<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 64 64"
  fill="none"
  shape-rendering="geometricPrecision"
>
  <title>TraceTxn</title>
  <desc>TraceTxn, operational payment infrastructure. Bold "T" wordmark with an emerald trace-head accent.</desc>

  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="#0A0A0A" />

  <!-- Horizontal bar of the T, the trace -->
  <rect x="14" y="18" width="36" height="6" rx="3" fill="#FFFFFF" />

  <!-- Vertical stem, the transaction descending into the lifecycle -->
  <rect x="29" y="18" width="6" height="32" rx="3" fill="#FFFFFF" />

  <!-- Trace-head accent: emerald dot marks the live edge of the chain -->
  <circle cx="50" cy="21" r="3" fill="#10B981" />
</svg>
